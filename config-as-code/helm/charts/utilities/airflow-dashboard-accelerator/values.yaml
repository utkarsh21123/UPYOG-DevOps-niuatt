## Airflow values for National Dashboard Accelerator
## Domain: https://niuatt.niua.in/

# 1. DAGs and Plugins Configuration
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: "git@github.com:niua-org/UPYOG-NIUA.git"
    branch: "niua-dev-2.0"
    subPath: "utilities/egov-national-dashboard-accelerator/dags"
    sshKeySecret: "git-creds"

plugins:
  gitSync:
    enabled: true
    repo: "git@github.com:niua-org/UPYOG-NIUA.git"
    branch: "niua-dev-2.0"
    subPath: "utilities/egov-national-dashboard-accelerator/plugins"
    sshKeySecret: "git-creds"

# 2. Webserver & Ingress Configuration
webserver:
  enabled: true
  service:
    type: ClusterIP

ingress:
  enabled: true
  context: "airflow"
  additionalAnnotations: |
    nginx.ingress.kubernetes.io/auth-signin:  https://$host/oauth2/start?rd=$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-url:     https://$host/oauth2/auth 

# 3. Component Configuration
dagProcessor:
  enabled: true

scheduler:
  replicas: 1

# 4. Database Configuration
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "15"