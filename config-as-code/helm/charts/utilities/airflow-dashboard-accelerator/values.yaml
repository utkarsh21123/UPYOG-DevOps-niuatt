## Airflow values for National Dashboard Accelerator DAGs and plugins
##
# DAGs are synced from the UPYOG-NIUA repo where
# utilities/egov-national-dashboard-accelerator/dags contains the DAG code.
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: "git@github.com:niua-org/UPYOG-NIUA.git"
    branch: "niua-dev-2.0"
    subPath: "utilities/egov-national-dashboard-accelerator/dags"
    sshKeySecret: "git-creds"

plugins:
  gitSync:
    enabled: true
    repo: "git@github.com:niua-org/UPYOG-NIUA.git"
    branch: "niua-dev-2.0"
    subPath: "utilities/egov-national-dashboard-accelerator/plugins"
    sshKeySecret: "git-creds"

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "15" 


