
labels:
  app: "requester-services-dx"
  group: "dx"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "requester-services-dx"

# Init Containers Configs
initContainers: {}

# Container Configs
image:
  repository: "requester-services-dx"
replicas: "1"
healthChecks:
  enabled: true
  livenessProbePath: "/requester-services-dx/health"
  readinessProbePath: "/requester-services-dx/health"
appType: "java-spring"
tracing-enabled: true
heap: "-Xmx256m -Xms256m"

java-args: "-Dspring.profiles.active=monitoring"
java-debug: ""

# Additional Container Envs
env: |
  - name: SERVER_PORT
    value: "8080"

  # Inject heap + force TLSv1.2 for JVM HTTPS clients (RestTemplate / HttpsURLConnection)
  - name: JAVA_OPTS
    value: {{ printf "%s -Dhttps.protocols=TLSv1.2 -Djdk.tls.client.protocols=TLSv1.2" (index .Values "heap") | quote }}

  # Also set JAVA_TOOL_OPTIONS so all JVM invocations pick these system properties
  - name: JAVA_TOOL_OPTIONS
    value: "-Dhttps.protocols=TLSv1.2 -Djdk.tls.client.protocols=TLSv1.2"

  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}

  - name: JAVA_ENABLE_DEBUG
    value: {{ index .Values "java-debug" | quote }}

  - name: EPRAMAAN_CLIENTID
    valueFrom:
      secretKeyRef:
        name: requester-services-dx
        key: epramaan-client-id

  - name: EPRAMAAN_AESKEY
    valueFrom:
      secretKeyRef:
        name: requester-services-dx
        key: epramaan-aes-key

  - name: EPRAMAAN_CERTIFICATE_VALUE
    valueFrom:
      secretKeyRef:
        name: requester-services-dx
        key: epramaan-certificate-value
