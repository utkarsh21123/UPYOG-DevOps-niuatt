# Common Labels
labels:
  app: "kibana"

namespace: backbone

# Ingress Configs
ingress:
  enabled: false
  context: "kibana"
  additionalAnnotations: |
    nginx.ingress.kubernetes.io/auth-signin: https://$host/oauth2/start?rd=$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-url: https://$host/oauth2/auth

# Init Containers Configs
initContainers: {}

# Container Configs
image:
  repository: "docker.elastic.co/kibana/kibana"
  tag: 8.11.3

replicas: "1"

httpPort: 5601

serverBasePath: "/kibana"

# Health Checks
healthChecks:
  enabled: true

  readinessProbe: |
    exec:
      command:
        - bash
        - -c
        - |
          #!/usr/bin/env bash -e

          export NSS_SDB_USE_CACHE=no

          STATUS=$(curl -L --output /dev/null --write-out "%{http_code}" -k "http://localhost:5601/kibana/app/kibana")

          if [[ "${STATUS}" -eq 200 ]]; then
            exit 0
          fi

          echo "Error: Got HTTP code ${STATUS} but expected a 200"
          exit 1

    initialDelaySeconds: 10
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 3
    failureThreshold: 3

  livenessProbe: |
    httpGet:
      path: /kibana/
      port: 5601
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 5

# Environment Variables
env: |
  - name: ELASTICSEARCH_HOSTS
    value: "https://elasticsearch-master.backbone:9200"

  - name: ELASTICSEARCH_SSL_VERIFICATIONMODE
    value: "none"

  - name: SERVER_HOST
    value: "0.0.0.0"

  - name: ELASTICSEARCH_SERVICEACCOUNTTOKEN
    valueFrom:
      secretKeyRef:
        name: kibana-es-token
        key: token
        optional: false

  - name: SERVER_REWRITEBASEPATH
    value: "true"

  - name: SERVER_BASEPATH
    value: "/kibana"

# Resources
resources: |
  limits:
    cpu: "1"
    memory: 2Gi

  requests:
    cpu: "1"
    memory: 2Gi

# Extra Volume Mounts
extraVolumes: |
  - name: kibana-tokens
    emptyDir: {}

extraVolumeMounts: |
  - name: kibana-tokens
    mountPath: /usr/share/kibana/config/tokens
    readOnly: true
