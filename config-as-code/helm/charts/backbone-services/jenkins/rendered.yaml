apiVersion: v1
kind: Pod
metadata:
  name: "test-ui-test-um3x2"
  namespace: jenkins
  annotations:
    "helm.sh/hook": test-success
spec:
  initContainers:
    - name: "test-framework"
      image: "docker.io/bats/bats:1.13.0"
      command:
        - "bash"
        - "-c"
      args:
        - |
          # copy bats to tools dir
          set -ex
          cp -R /opt/bats /tools/bats/
      volumeMounts:
      - mountPath: /tools
        name: tools
  containers:
    - name: test-ui-test
      image: "docker.io/jenkins/jenkins:2.555.3-jdk21"
      command: ["/tools/bats/bin/bats", "-t", "/tests/run.sh"]
      volumeMounts:
      - mountPath: /tests
        name: tests
        readOnly: true
      - mountPath: /tools
        name: tools
  volumes:
  - name: tests
    configMap:
      name: test-jenkins-tests
  - name: tools
    emptyDir: {}
  restartPolicy: Never

